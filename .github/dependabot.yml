version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        versions: [">=10"]
    groups:
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      clerk:
        patterns:
          - "@clerk/*"
      next:
        patterns:
          - "next"
          - "react"
          - "react-dom"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
